seed: 42

# Synchronized with ED_BASE/core/config.py defaults (sample_rate=16000)
fs: 16000
train_segment_length: 1.0
val_segment_length: 1.0
max_dynamic_range: 25.0
num_workers: 2

# LitData chunk dirs generated by:
#   addse prepare-edbase-data --edbase-config-py ../ED_BASE/config.py
train_speech_chunks: data/chunks/edbase_speech/
train_noise_chunks: data/chunks/edbase_noise/

lm:
  _target_: addse.lightning.ADDSELightningModule
  nac_cfg: configs/nac.yaml
  # Set this to your local NAC checkpoint before running.
  nac_ckpt: logs/nac/checkpoints/last.ckpt
  model:
    _target_: addse.models.ADDSERQDiT
    input_channels: 1024
    output_channels: 1024
    num_codebooks: 4
    hidden_dim: 96
    num_layers: 12
    num_heads: 12
    max_seq_len: 1024
    conditional: true
    time_independent: true
  num_steps: 128
  block_size: 200
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 1.0e-4
    eps: 1.0e-7
  debug_sample: [0, 0]

dm:
  _target_: addse.lightning.DataModule
  train_dataset:
    _target_: addse.data.DynamicMixingDataset
    _partial_: true
    length: .inf
    resume: true
    reset_rngs: false
    snr_range: [-3.0, 15.0]
    noise_aug_prob: 0.9
    noise_time_stretch_range: [0.8, 1.25]
    noise_shift_prob: 0.9
    noise_selfmix_prob: 0.6
    noise_filter_prob: 0.6
    speech_dataset:
      _target_: addse.data.AudioStreamingDataset
      input_dir: ${train_speech_chunks}
      fs: ${fs}
      segment_length: ${train_segment_length}
      max_dynamic_range: ${max_dynamic_range}
      seed: ${seed}
    noise_dataset:
      _target_: addse.data.AudioStreamingDataset
      input_dir: ${train_noise_chunks}
      fs: ${fs}
      segment_length: ${train_segment_length}
      max_dynamic_range: ${max_dynamic_range}
      seed: ${seed}
  val_dataset:
    _target_: addse.data.DynamicMixingDataset
    _partial_: true
    length: 64
    resume: false
    reset_rngs: true
    snr_range: [-3.0, 15.0]
    speech_dataset:
      _target_: addse.data.AudioStreamingDataset
      input_dir: ${train_speech_chunks}
      fs: ${fs}
      segment_length: ${val_segment_length}
      max_dynamic_range: ${max_dynamic_range}
      seed: ${seed}
      shuffle: true
    noise_dataset:
      _target_: addse.data.AudioStreamingDataset
      input_dir: ${train_noise_chunks}
      fs: ${fs}
      segment_length: ${val_segment_length}
      max_dynamic_range: ${max_dynamic_range}
      seed: ${seed}
      shuffle: true
  train_dataloader:
    _target_: addse.data.AudioStreamingDataLoader
    _partial_: true
    batch_size: 4
    num_workers: ${num_workers}
    shuffle: true
  val_dataloader:
    _target_: addse.data.AudioStreamingDataLoader
    _partial_: true
    batch_size: 1
    num_workers: ${num_workers}
    shuffle: false

trainer:
  _target_: lightning.Trainer
  # Keep small for smoke test.
  limit_train_batches: 20
  limit_val_batches: 2
  max_epochs: 20
  gradient_clip_val: 1.0
  accelerator: gpu
  devices: 1
  precision: 16-mixed

extra_callbacks:
  - _target_: addse.callbacks.EMAWeightAveraging
    decay: 0.999

eval:
  dsets:
    edbase-local:
      _target_: addse.data.DynamicMixingDataset
      length: 200
      resume: false
      reset_rngs: true
      snr_range: [-3.0, 15.0]
      rms_range: [0.0, 0.0]
      speech_dataset:
        _target_: addse.data.AudioStreamingDataset
        input_dir: ${train_speech_chunks}
        fs: ${fs}
        segment_length: null
        max_length: 20.0
        shuffle: true
        seed: ${seed}
      noise_dataset:
        _target_: addse.data.AudioStreamingDataset
        input_dir: ${train_noise_chunks}
        fs: ${fs}
        segment_length: null
        max_length: 20.0
        shuffle: true
        seed: ${seed}
  metrics:
    sdr:
      _target_: addse.metrics.SDRMetric
      scale_invariant: false
    estoi:
      _target_: addse.metrics.STOIMetric
      fs: ${fs}
      extended: true
    pesq:
      _target_: addse.metrics.PESQMetric
      fs: ${fs}

name: addse-s-edbase-parallel60-a005dyn
seed: 42
fs: 16000
train_segment_length: 1.0
val_segment_length: 1.0
max_dynamic_range: 25.0
num_workers: 0

train_speech_chunks: data/chunks/edbase_speech/
train_noise_chunks: data/chunks/edbase_noise/

lm:
  _target_: addse.lightning.ADDSELightningModule
  nac_cfg: configs/nac.yaml
  nac_ckpt: logs/nac/checkpoints/last.ckpt
  model:
    _target_: addse.models.ADDSERQDiTParallel
    input_channels: 1024
    output_channels: 1024
    num_codebooks: 4
    hidden_dim: 192
    num_layers: 12
    num_heads: 12
    max_seq_len: 1024
    conditional: true
    time_independent: true
    interaction_alpha: 0.05
    adapter_hidden: 256
    fusion_mode: add
    use_adain_align: true
    use_freq_dynamic_gate: true
    gate_kernel_size: 3
    use_pitch_aware_gate: true
    pitch_gain: 0.1
    dynamic_alpha: true
    alpha_max: 0.08
    use_fusion_norm: false
  trainable_param_patterns: ["adapter", "gate_proj", "parallel_proj", "freq_gate", "alpha_proj", "output_proj"]
  num_steps: 128
  block_size: 200
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 1.0e-4
    eps: 1.0e-7
  debug_sample: [0, 0]

dm:
  _target_: addse.lightning.DataModule
  train_dataset:
    _target_: addse.data.DynamicMixingDataset
    _partial_: true
    length: 60
    resume: true
    reset_rngs: false
    snr_range: [0.0, 10.0]
    speech_dataset:
      _target_: addse.data.AudioStreamingDataset
      input_dir: ${train_speech_chunks}
      fs: ${fs}
      segment_length: ${train_segment_length}
      max_dynamic_range: ${max_dynamic_range}
      seed: ${seed}
    noise_dataset:
      _target_: addse.data.AudioStreamingDataset
      input_dir: ${train_noise_chunks}
      fs: ${fs}
      segment_length: ${train_segment_length}
      max_dynamic_range: ${max_dynamic_range}
      seed: ${seed}
  val_dataset:
    _target_: addse.data.DynamicMixingDataset
    _partial_: true
    length: 20
    resume: false
    reset_rngs: true
    snr_range: [0.0, 10.0]
    speech_dataset:
      _target_: addse.data.AudioStreamingDataset
      input_dir: ${train_speech_chunks}
      fs: ${fs}
      segment_length: ${val_segment_length}
      max_dynamic_range: ${max_dynamic_range}
      seed: ${seed}
      shuffle: true
    noise_dataset:
      _target_: addse.data.AudioStreamingDataset
      input_dir: ${train_noise_chunks}
      fs: ${fs}
      segment_length: ${val_segment_length}
      max_dynamic_range: ${max_dynamic_range}
      seed: ${seed}
      shuffle: true
  train_dataloader:
    _target_: addse.data.AudioStreamingDataLoader
    _partial_: true
    batch_size: 8
    num_workers: ${num_workers}
    shuffle: true
  val_dataloader:
    _target_: addse.data.AudioStreamingDataLoader
    _partial_: true
    batch_size: 1
    num_workers: ${num_workers}
    shuffle: false

trainer:
  _target_: lightning.Trainer
  accelerator: gpu
  devices: 1
  limit_train_batches: 8
  limit_val_batches: 2
  max_epochs: 10
  gradient_clip_val: 1.0
  precision: 16-mixed

extra_callbacks:
  - _target_: addse.callbacks.EMAWeightAveraging
    decay: 0.999

eval:
  dsets:
    edbase-local:
      _target_: addse.data.DynamicMixingDataset
      length: 60
      resume: false
      reset_rngs: true
      snr_range: [0.0, 10.0]
      rms_range: [0.0, 0.0]
      speech_dataset:
        _target_: addse.data.AudioStreamingDataset
        input_dir: ${train_speech_chunks}
        fs: ${fs}
        segment_length: 1.0
        max_length: null
        shuffle: true
      noise_dataset:
        _target_: addse.data.AudioStreamingDataset
        input_dir: ${train_noise_chunks}
        fs: ${fs}
        segment_length: 1.0
        max_length: null
        shuffle: true
  metrics:
    sdr:
      _target_: addse.metrics.SDRMetric
      scale_invariant: false
    estoi:
      _target_: addse.metrics.STOIMetric
      fs: ${fs}
      extended: true
    pesq:
      _target_: addse.metrics.PESQMetric
      fs: ${fs}

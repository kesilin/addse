name: addse-s-edbase-parallel60-a008-p02-spec
seed: 42
fs: 16000
train_segment_length: 1.0
val_segment_length: 1.0
max_dynamic_range: 25.0
num_workers: 0

train_speech_chunks: data/chunks/edbase_speech/
train_noise_chunks: data/chunks/edbase_noise/

lm:
  _target_: addse.lightning.ADDSELightningModule
  nac_cfg: configs/nac.yaml
  nac_ckpt: logs/nac/checkpoints/last.ckpt
  pretrained_ckpt: logs/addse-edbase-quick/checkpoints/addse-s.ckpt
  model:
    _target_: addse.models.ADDSERQDiTParallel
    input_channels: 1024
    output_channels: 1024
    num_codebooks: 4
    hidden_dim: 192
    num_layers: 12
    num_heads: 12
    max_seq_len: 1024
    conditional: true
    time_independent: true
    interaction_alpha: 0.012
    adapter_hidden: 256
    fusion_mode: add
    use_adain_align: true
    use_freq_dynamic_gate: true
    gate_kernel_size: 3
    use_pitch_aware_gate: true
    pitch_gain: 0.2
    interaction_on_logits: true
    use_semantic_guidance: true
    use_snr_adaptive_gate: true
    use_interaction_alignment_gate: true
    use_interaction_confidence_gate: true
    use_band_quality_gate: true
    interaction_gate_floor: 0.2
    quality_head_hidden: 128
    dynamic_alpha: true
    alpha_max: 0.04
    use_fusion_norm: false
  spec_loss:
    _target_: addse.losses.MSMelSpecLoss
    fs: ${fs}
    frame_lengths: [127, 257, 509, 1021]
    n_mels: [32, 64, 128, 256]
  spec_loss_weight: 2.0
  si_sdr_weight: 2.0
  residual_l1_weight: 2.0
  wave_l1_weight: 1.5
  residual_cos_weight: 0.0
  residual_std_weight: 0.0
  residual_ema_decay: 0.8
  quality_branch_weight: 0.0
  quality_smooth_weight: 0.0
  wave_residual_enabled: true
  wave_residual_num_filters: 128
  wave_residual_filter_size: 16
  wave_residual_hop_size: 8
  wave_residual_bottleneck_channels: 64
  wave_residual_hidden_channels: 128
  wave_residual_skip_channels: 64
  wave_residual_kernel_size: 3
  wave_residual_layers: 4
  wave_residual_repeats: 2
  enable_latent_residual_add: false
  max_residual_ratio: 0.03
  fidelity_gate_enabled: true
  fidelity_gate_min: 0.2
  fidelity_gate_max: 1.0
  fidelity_conf_threshold: 0.75
  fidelity_conf_sharpness: 10.0
  fidelity_energy_ref: 0.2
  snr_adaptive_fusion: true
  snr_adaptive_threshold: 0.8
  snr_adaptive_sharpness: 5.0
  deterministic_eval: true
  metricgan_plus_enabled: false
  metricgan_weight: 0.0
  metricgan_disc_lr: 1.0e-4
  metricgan_update_every: 8
  metricgan_start_step: 100
  metricgan_batch_items: 1
  trainable_param_patterns: ["refiner", "freq_gate", "pitch_gate", "quality_head", "snr_gate_proj", "interaction_proj", "parallel_proj", "interaction_alpha"]
  num_steps: 128
  block_size: 200
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 6.0e-5
    eps: 1.0e-7
  debug_sample: [0, 0]

dm:
  _target_: addse.lightning.DataModule
  train_dataset:
    _target_: addse.data.DynamicMixingDataset
    _partial_: true
    length: 320
    resume: true
    reset_rngs: false
    snr_range: [0.0, 10.0]
    speech_dataset:
      _target_: addse.data.AudioStreamingDataset
      input_dir: ${train_speech_chunks}
      fs: ${fs}
      segment_length: ${train_segment_length}
      max_dynamic_range: ${max_dynamic_range}
      seed: ${seed}
    noise_dataset:
      _target_: addse.data.AudioStreamingDataset
      input_dir: ${train_noise_chunks}
      fs: ${fs}
      segment_length: ${train_segment_length}
      max_dynamic_range: ${max_dynamic_range}
      seed: ${seed}
  val_dataset:
    _target_: addse.data.DynamicMixingDataset
    _partial_: true
    length: 40
    resume: false
    reset_rngs: true
    snr_range: [0.0, 10.0]
    speech_dataset:
      _target_: addse.data.AudioStreamingDataset
      input_dir: ${train_speech_chunks}
      fs: ${fs}
      segment_length: ${val_segment_length}
      max_dynamic_range: ${max_dynamic_range}
      seed: ${seed}
      shuffle: true
    noise_dataset:
      _target_: addse.data.AudioStreamingDataset
      input_dir: ${train_noise_chunks}
      fs: ${fs}
      segment_length: ${val_segment_length}
      max_dynamic_range: ${max_dynamic_range}
      seed: ${seed}
      shuffle: true
  train_dataloader:
    _target_: addse.data.AudioStreamingDataLoader
    _partial_: true
    batch_size: 8
    num_workers: ${num_workers}
    shuffle: true
  val_dataloader:
    _target_: addse.data.AudioStreamingDataLoader
    _partial_: true
    batch_size: 1
    num_workers: ${num_workers}
    shuffle: false

trainer:
  _target_: lightning.Trainer
  accelerator: gpu
  devices: 1
  limit_train_batches: 8
  limit_val_batches: 2
  max_epochs: 10
  gradient_clip_val: 1.0
  precision: 16-mixed

extra_callbacks:
  - _target_: addse.callbacks.EMAWeightAveraging
    decay: 0.999

eval:
  dsets:
    edbase-local:
      _target_: addse.data.DynamicMixingDataset
      length: 60
      resume: false
      reset_rngs: true
      snr_range: [0.0, 10.0]
      rms_range: [0.0, 0.0]
      speech_dataset:
        _target_: addse.data.AudioStreamingDataset
        input_dir: ${train_speech_chunks}
        fs: ${fs}
        segment_length: 1.0
        max_length: null
        shuffle: false
      noise_dataset:
        _target_: addse.data.AudioStreamingDataset
        input_dir: ${train_noise_chunks}
        fs: ${fs}
        segment_length: 1.0
        max_length: null
        shuffle: false
  metrics:
    sdr:
      _target_: addse.metrics.SDRMetric
      scale_invariant: false
    si_sdr:
      _target_: addse.metrics.SDRMetric
      scale_invariant: true
      zero_mean: true
    estoi:
      _target_: addse.metrics.STOIMetric
      fs: ${fs}
      extended: true
    pesq:
      _target_: addse.metrics.PESQMetric
      fs: ${fs}

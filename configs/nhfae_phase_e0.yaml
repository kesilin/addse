experiment:
  name: nhfae_phase_e0
  description: FATC controller ablation around Phase-First Flow

data:
  clean_dir: outputs/phase6/controlled_snr_test31/snr_10_15/clean
  noisy_dir: outputs/phase6/controlled_snr_test31/snr_10_15/noisy
  addse_dir: outputs/phase6/controlled_runs/snr_10_15/addse
  pguse_dir: outputs/phase6/controlled_runs/snr_10_15/pguse_only/wav

fatc:
  phase_first: true
  g_low: 0.02
  g_high: 0.35
  gamma: 2.0
  conf_thr: 0.22
  conf_slope: 12.0

ablation:
  run_no_freq_adapt: true
  run_no_confidence_gate: true

metrics:
  overall:
    - pesq
    - estoi
    - sdr
  highband:
    enabled: true
    low_hz: 4000
    high_hz: 8000

output:
  root: outputs/phase8/nhfae_e0
  keep_only_summary: true
  summary_csv: outputs/phase6/controlled_runs/summary_overall_all_sets.csv
